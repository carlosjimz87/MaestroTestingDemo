appId: com.carlosjimz87.maestrotestingdemo
---
- runFlow: ../subflows/login.yaml

# Verify Tasks tab is active
- assertVisible: "My Tasks"

# Switch to Search tab
- tapOn: "Search"
- waitForAnimationToEnd
- assertVisible: "Search Tasks"

# Switch to Profile tab
- tapOn: "Profile"
- waitForAnimationToEnd
- assertVisible: "Profile"
- assertVisible: "Carlos"

# Switch back to Tasks tab
- tapOn: "Tasks"
- waitForAnimationToEnd
- assertVisible: "My Tasks"

- takeScreenshot: screenshots/11_navigation_tabs
