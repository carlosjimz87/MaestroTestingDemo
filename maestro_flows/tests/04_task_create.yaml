appId: com.carlosjimz87.maestrotestingdemo

---

- runFlow: ../subflows/login.yaml

# Wait for list to load
- extendedWaitUntil:
    visible: "Review pull requests"
    timeout: 10000

# Tap FAB to add task
- tapOn: "Add Task"

- waitForAnimationToEnd
- assertVisible: "Add Task"

# Fill in the form
- tapOn: "Title"
- inputText: "New Maestro Task"

- tapOn: "Description"
- inputText: "Created during E2E test run"
- hideKeyboard

# Select priority
- tapOn: "Priority"
- tapOn: "HIGH"

# Select category
- tapOn: "Category"
- tapOn: "Work"

# Save
- tapOn: "Save Task"

- waitForAnimationToEnd

# Verify we're back on the list and the new task exists
- assertVisible: "My Tasks"

- scrollUntilVisible:
    element: "New Maestro Task"
    direction: DOWN
    timeout: 10000

- assertVisible: "New Maestro Task"

- takeScreenshot: screenshots/04_task_create
