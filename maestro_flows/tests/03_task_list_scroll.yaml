appId: com.carlosjimz87.maestrotestingdemo

---

- runFlow: ../subflows/login.yaml

- assertVisible: "My Tasks"

# Wait for task list to load
- extendedWaitUntil:
    visible: "Review pull requests"
    timeout: 15000

# Verify first visible tasks
- assertVisible: "Review pull requests"
- assertVisible: "Buy groceries"

# Scroll down to find a task further in the list (use a mid-list task for reliability)
- scrollUntilVisible:
    element: "Water plants"
    direction: DOWN
    timeout: 30000
    speed: 40

- assertVisible: "Water plants"

# Scroll back to top
- scrollUntilVisible:
    element: "Review pull requests"
    direction: UP
    timeout: 30000
    speed: 40

- takeScreenshot: screenshots/03_task_list_scroll
