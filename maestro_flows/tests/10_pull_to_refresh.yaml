appId: com.carlosjimz87.maestrotestingdemo

---

- runFlow: ../subflows/login.yaml

# Wait for list to load
- extendedWaitUntil:
    visible: "Review pull requests"
    timeout: 10000

# Pull to refresh from the first visible task item
- assertVisible: "Review pull requests"
- swipe:
      direction: DOWN
      from:
          text: "Review pull requests"
      duration: 800
      waitToSettleTimeoutMs: 2000

# Wait for refresh to complete
- extendedWaitUntil:
    visible: "Review pull requests"
    timeout: 10000

- takeScreenshot: screenshots/10_pull_to_refresh
