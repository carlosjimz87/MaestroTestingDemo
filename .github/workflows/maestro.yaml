name: Maestro E2E with Docker Android Emulator

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  maestro-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      emulator:
        image: budtmo/docker-android:emulator_14.0
        ports:
          - 6080:6080
          - 5554:5554
          - 5555:5555
        options: >-
          --privileged
          --device /dev/kvm
          -e EMULATOR_DEVICE="Samsung Galaxy S10"
          -e WEB_VNC=true
          -e APPIUM=false
          -e AUTO_RECORD=false
          -e ENFORCE_DEV_MODE=false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Run Lint
        continue-on-error: true
        run: ./gradlew lintDebug

      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Install ADB
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb

      - name: Wait for Emulator
        run: |
          MAX_RETRIES=12
          RETRY=0
          until adb connect localhost:5555 | grep -q "connected"; do
            RETRY=$((RETRY + 1))
            if [ $RETRY -ge $MAX_RETRIES ]; then
              echo "Failed to connect to emulator after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "Waiting for emulator connection (attempt $RETRY/$MAX_RETRIES)..."
            sleep 5
          done

          DEVICE_ID=$(adb devices | grep 'device$' | awk 'NR==1{print $1}')
          echo "Using emulator: $DEVICE_ID"
          adb -s "$DEVICE_ID" wait-for-device

          # Wait for boot with timeout
          BOOT_TIMEOUT=120
          ELAPSED=0
          while [ -z "$(adb -s "$DEVICE_ID" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" ]; do
            if [ $ELAPSED -ge $BOOT_TIMEOUT ]; then
              echo "Emulator boot timed out after ${BOOT_TIMEOUT}s"
              exit 1
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done

          echo "Emulator booted successfully"
          adb -s "$DEVICE_ID" shell getprop ro.build.display.id
          adb -s "$DEVICE_ID" shell input keyevent 82

      - name: Install APK
        run: |
          DEVICE_ID=$(adb devices | grep 'device$' | awk 'NR==1{print $1}')
          adb -s "$DEVICE_ID" install -r app/build/outputs/apk/debug/app-debug.apk

      - name: Run Maestro Tests
        continue-on-error: true
        env:
          MAESTRO_API_KEY: ${{ secrets.MAESTRO_API_KEY }}
        run: |
          rm -rf screenshots maestro-report maestro-output.log || true
          mkdir -p screenshots maestro-report

          maestro test maestro_flows/flows.yaml \
            --format html-detailed \
            --output maestro-report/index.html \
            | tee maestro-output.log

          mv *.png screenshots/ || true

      - name: Run AI Visual Checks
        if: ${{ env.MAESTRO_API_KEY != '' }}
        continue-on-error: true
        env:
          MAESTRO_API_KEY: ${{ secrets.MAESTRO_API_KEY }}
        run: |
          mkdir -p maestro-ai-report

          maestro test maestro_flows/ai_visual_check.yaml \
            --format html-detailed \
            --output maestro-ai-report/index.html \
            | tee -a maestro-output.log

          mv *.png screenshots/ || true

      - name: Test Summary
        if: always()
        run: |
          echo "## Maestro E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f maestro-output.log ]; then
            echo "### Test Output (last 30 lines)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 maestro-output.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-test-results
          path: |
            maestro-report/
            maestro-ai-report/
            screenshots/
            maestro-output.log
            app/build/reports/lint-results-debug.html
          retention-days: 30

      - name: Prepare GitHub Pages
        if: always()
        run: |
          mkdir -p gh-pages/screenshots

          # Generate landing page
          cat > gh-pages/index.html << 'LANDING'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>TaskFlow - Maestro Test Reports</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
              .header { background: linear-gradient(135deg, #00897B, #00695C); color: white; padding: 2rem; text-align: center; }
              .header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
              .header p { opacity: 0.9; }
              .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
              .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
              .card h2 { margin-bottom: 0.5rem; color: #00897B; }
              .card a { color: #00897B; text-decoration: none; font-weight: 600; }
              .card a:hover { text-decoration: underline; }
              .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; margin-top: 1rem; }
              .grid img { width: 100%; border-radius: 8px; border: 1px solid #ddd; }
              .meta { font-size: 0.85rem; color: #666; margin-top: 1rem; }
            </style>
          </head>
          <body>
            <div class="header">
              <h1>TaskFlow - Maestro Test Reports</h1>
              <p>Automated E2E test results with AI-powered visual assertions</p>
            </div>
            <div class="container">
              <div class="card">
                <h2>Test Reports</h2>
                <p><a href="report/index.html">Main Maestro Report</a> - Full E2E test suite (12 flows)</p>
                <p style="margin-top:0.5rem"><a href="ai-report/index.html">AI Visual Check Report</a> - AI-powered visual regression tests</p>
                <p style="margin-top:0.5rem"><a href="lint-report.html">Lint Report</a> - Static code analysis</p>
              </div>
              <div class="card">
                <h2>Test Log</h2>
                <p><a href="maestro-output.log">Full test output log</a></p>
              </div>
              <div class="card">
                <h2>Screenshots</h2>
                <div class="grid" id="screenshots"></div>
              </div>
              <div class="meta">
                <p>Generated by GitHub Actions CI pipeline</p>
              </div>
            </div>
            <script>
              fetch('screenshots/').then(r => r.text()).then(html => {
                const imgs = [...html.matchAll(/href="([^"]+\.png)"/g)].map(m => m[1]);
                const grid = document.getElementById('screenshots');
                imgs.forEach(img => {
                  const a = document.createElement('a');
                  a.href = 'screenshots/' + img;
                  a.innerHTML = '<img src="screenshots/' + img + '" alt="' + img + '">';
                  grid.appendChild(a);
                });
                if (imgs.length === 0) grid.innerHTML = '<p>No screenshots available</p>';
              }).catch(() => {
                document.getElementById('screenshots').innerHTML = '<p>Screenshots directory listing not available</p>';
              });
            </script>
          </body>
          </html>
          LANDING

          # Copy Maestro report
          if [ -d maestro-report ]; then
            mkdir -p gh-pages/report
            cp -r maestro-report/* gh-pages/report/ || true
          fi

          # Include AI report if it exists
          if [ -d maestro-ai-report ]; then
            mkdir -p gh-pages/ai-report
            cp -r maestro-ai-report/* gh-pages/ai-report/ || true
          fi

          # Include lint report
          cp app/build/reports/lint-results-debug.html gh-pages/lint-report.html || true

          # Include screenshots and assets
          cp screenshots/*.png gh-pages/screenshots/ || true
          cp app/src/main/assets/favicon.png gh-pages/favicon.png || true
          cp maestro-output.log gh-pages/ || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
